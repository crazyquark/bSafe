<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bSafe Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
/* ============================================================
   DESIGN: Industrial control room — dark panels, amber accents,
   CRT-green telemetry, machined metal textures
   ============================================================ */
:root {
  --bg:          #0d0f0e;
  --panel:       #141816;
  --panel2:      #1a1d1b;
  --border:      #2a2e2b;
  --border-hi:   #3d4440;
  --amber:       #e8a020;
  --amber-dim:   #7a520e;
  --green:       #3ddc84;
  --green-dim:   #1a5c38;
  --red:         #e84040;
  --red-dim:     #5c1a1a;
  --yellow:      #e8c820;
  --blue:        #4080e8;
  --text:        #c8d4c0;
  --text-dim:    #6a7868;
  --text-bright: #eef4ea;
  --mono:        'Share Tech Mono', monospace;
  --sans:        'Barlow Condensed', sans-serif;
  --body:        'Barlow', sans-serif;
  --radius:      3px;
  --card-w:      200px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 13px;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
  pointer-events: none; z-index: 9999;
}

/* ---- Layout ---- */
#root {
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

#top-panel {
  flex: 0 0 auto;
  border-bottom: 2px solid var(--amber-dim);
  background: var(--panel);
  overflow: hidden;
}

#bottom-panel {
  flex: 1 1 auto;
  overflow-y: auto; overflow-x: hidden;
  padding: 12px;
  background: var(--bg);
}

/* ---- Top panel layout ---- */
#top-inner {
  display: flex; gap: 0;
  height: 100%;
}

.top-section {
  border-right: 1px solid var(--border);
  padding: 10px 12px;
  overflow: hidden;
}

#sec-programs  { width: 340px; display: flex; flex-direction: column; gap: 6px; }
#sec-editor    { flex: 1 1 auto; display: flex; flex-direction: column; gap: 6px; }
#sec-suggest   { width: 240px; display: flex; flex-direction: column; gap: 4px; }
#sec-limits    { width: 220px; display: flex; flex-direction: column; gap: 4px; }
#sec-actions   { width: 180px; display: flex; flex-direction: column; gap: 6px; border-right: none; }

/* ---- Section headers ---- */
.sec-header {
  font-family: var(--sans);
  font-weight: 700; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--amber); margin-bottom: 4px;
  border-bottom: 1px solid var(--amber-dim);
  padding-bottom: 3px;
}

/* ---- Program list ---- */
#program-list {
  flex: 1 1 auto; overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.prog-item {
  padding: 6px 8px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.prog-item:hover  { background: var(--panel2); }
.prog-item.active { background: #1e2820; border-left: 2px solid var(--amber); }
.prog-item .p-title {
  font-family: var(--sans); font-weight: 600;
  font-size: 12px; color: var(--text-bright);
}
.prog-item .p-date {
  font-size: 10px; color: var(--text-dim);
  font-family: var(--mono);
}

/* ---- Program actions row ---- */
.prog-actions { display: flex; gap: 4px; }

/* ---- Editor textarea ---- */
#prog-title-input {
  width: 100%; background: var(--panel2);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-bright); font-family: var(--sans);
  font-weight: 600; font-size: 14px; padding: 4px 8px;
  outline: none;
}
#prog-title-input:focus { border-color: var(--amber-dim); }

#prog-editor {
  flex: 1 1 auto; resize: none;
  background: #0a0c0b;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: #7ddc7d;
  font-family: var(--mono); font-size: 13px;
  line-height: 1.6; padding: 8px;
  outline: none; transition: border-color 0.3s;
  min-height: 120px;
}
#prog-editor.valid   { border-color: var(--green); }
#prog-editor.invalid { border-color: var(--red); }
#prog-editor:focus   { border-color: var(--amber-dim); }

/* ---- Suggest panel ---- */
#suggest-box {
  flex: 1 1 auto; overflow-y: auto;
  font-family: var(--mono); font-size: 11px;
  line-height: 1.7;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px;
  background: #0a0c0b;
}
.sug-line  { color: var(--text-dim); }
.sug-ok    { color: var(--green); }
.sug-warn  { color: var(--yellow); }
.sug-error { color: var(--red); }
.sug-tip   { color: var(--amber); }

/* ---- Hard limits ---- */
#limits-form {
  flex: 1 1 auto; overflow-y: auto;
  display: flex; flex-direction: column; gap: 5px;
}
.limit-row {
  display: flex; align-items: center;
  gap: 6px; font-size: 11px;
  font-family: var(--sans);
}
.limit-row label { flex: 1; color: var(--text-dim); }
.limit-input {
  width: 64px; background: var(--panel2);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--amber); font-family: var(--mono);
  font-size: 11px; text-align: right; padding: 2px 4px;
  outline: none;
}
.limit-input:focus { border-color: var(--amber-dim); }
.limit-check { accent-color: var(--amber); }

/* ---- Action buttons ---- */
.btn {
  width: 100%; padding: 8px 10px;
  border: none; border-radius: var(--radius);
  font-family: var(--sans); font-weight: 700;
  font-size: 12px; letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer;
  transition: filter 0.15s, transform 0.1s;
  outline: none;
}
.btn:active { transform: scale(0.97); }
.btn:hover  { filter: brightness(1.15); }

.btn-red    { background: var(--red);    color: #fff; }
.btn-yellow { background: var(--yellow); color: #111; }
.btn-green  { background: var(--green);  color: #061a0e; }
.btn-blue   { background: var(--blue);   color: #fff; }
.btn-gray   { background: var(--border-hi); color: var(--text); cursor: default; }
.btn-sm     { padding: 4px 8px; font-size: 10px; width: auto; }

/* ---- Status box ---- */
#status-box {
  padding: 8px; border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--panel2);
  font-family: var(--mono); font-size: 11px;
  color: var(--text-dim); line-height: 1.5;
  flex: 1 1 auto;
}
#status-box .sb-state {
  font-size: 13px; font-weight: bold;
  font-family: var(--sans); letter-spacing: 1px;
}
.sb-idle     { color: var(--text-dim); }
.sb-running  { color: var(--green); }
.sb-stopped  { color: var(--red); }
.sb-auto     { color: var(--blue); }

/* ============================================================
   DEVICE CARDS
   ============================================================ */
.no-devices-msg {
  color: var(--dim); font-family: var(--mono); font-size: 12px;
  padding: 24px 16px; text-align: center; letter-spacing: 1px;
}

#device-grid {
  display: flex; flex-wrap: wrap; gap: 10px;
  align-content: flex-start;
}

.device-card {
  width: var(--card-w);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: relative; overflow: hidden;
  transition: border-color 0.3s;
  flex-shrink: 0;
}
.device-card.online  { border-color: var(--border-hi); }
.device-card.offline { border-color: var(--red-dim); opacity: 0.6; }
.device-card.running { border-color: var(--green-dim); }
.device-card.error   { border-color: var(--red); animation: pulse-red 1s infinite; }

@keyframes pulse-red {
  0%,100% { border-color: var(--red); }
  50%      { border-color: var(--red-dim); }
}

/* ---- Title bar ---- */
.card-titlebar {
  display: flex; align-items: center;
  height: 28px; overflow: hidden;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  position: relative; user-select: none;
}

.card-title-text {
  flex: 1; padding: 0 8px;
  font-family: var(--sans); font-weight: 700;
  font-size: 12px; letter-spacing: 1px;
  color: var(--amber); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}
.card-title-text[style*="cursor:pointer"]:hover { color: var(--text); }

.card-ver-badge {
  flex-shrink: 0;
  padding: 0 7px 0 4px;
  font-family: var(--mono); font-size: 10px;
  color: var(--dim); letter-spacing: 0.5px;
  white-space: nowrap; pointer-events: none;
}

.card-title-input {
  flex: 1; padding: 0 7px;
  font-family: var(--sans); font-weight: 700;
  font-size: 12px; letter-spacing: 1px;
  color: var(--amber);
  background: var(--panel2);
  border: 1px solid var(--amber);
  border-radius: 2px;
  outline: none;
  min-width: 0;
}

/* ---- Drag handle (sliding control panel) ---- */
.ctrl-slider {
  position: absolute; top: 0; right: 0;
  height: 28px;
  background: var(--panel2);
  border-left: 2px solid var(--amber-dim);
  display: flex; align-items: center;
  overflow: hidden;
  transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
  cursor: grab;
  width: 20px; /* collapsed = just the handle */
  z-index: 10;
}
.ctrl-slider.open { width: 50%; cursor: grab; }
.ctrl-slider:active { cursor: grabbing; }

.ctrl-handle {
  flex-shrink: 0; width: 20px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--amber-dim);
  letter-spacing: 0; writing-mode: vertical-rl;
  pointer-events: none; font-family: var(--mono);
}

.ctrl-btns {
  display: flex; align-items: center;
  gap: 4px; padding: 0 6px;
  opacity: 0; transition: opacity 0.2s 0.1s;
  pointer-events: none;
}
.ctrl-slider.open .ctrl-btns {
  opacity: 1; pointer-events: all;
}

.ctrl-btn {
  width: 22px; height: 20px; border: none;
  border-radius: 2px; cursor: pointer;
  font-size: 13px; display: flex;
  align-items: center; justify-content: center;
  background: var(--panel); transition: background 0.15s;
}
.ctrl-btn:hover { background: var(--border-hi); }
.ctrl-btn.cb-start  { color: var(--green); }
.ctrl-btn.cb-pause  { color: var(--yellow); }
.ctrl-btn.cb-stop   { color: var(--red); }
.ctrl-btn.cb-unload { color: var(--text-dim); }

/* ---- Card body ---- */
.card-body {
  padding: 8px;
  font-family: var(--mono); font-size: 11px;
  line-height: 1.8;
}

.card-row {
  display: flex; justify-content: space-between;
}
.card-key   { color: var(--text-dim); }
.card-val   { color: var(--text-bright); text-align: right; }
.card-val.green  { color: var(--green); }
.card-val.amber  { color: var(--amber); }
.card-val.red    { color: var(--red); }
.card-val.yellow { color: var(--yellow); }

.card-divider {
  border: none; border-top: 1px solid var(--border);
  margin: 4px 0;
}

/* Session step bar */
.step-bar {
  width: 100%; height: 4px;
  background: var(--border);
  border-radius: 2px; overflow: hidden;
  margin: 4px 0;
}
.step-bar-fill {
  height: 100%; background: var(--green);
  border-radius: 2px; transition: width 0.5s;
}

.card-session-status {
  font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase;
  font-family: var(--sans); font-weight: 700;
}
.sess-running { color: var(--green); }
.sess-paused  { color: var(--yellow); }
.sess-stopped { color: var(--red); }
.sess-done    { color: var(--blue); }

.card-started-at {
  font-size: 9px; color: var(--text-dim);
  margin-top: 2px;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

/* ---- Offline badge ---- */
.badge-offline {
  display: inline-block; padding: 1px 4px;
  background: var(--red-dim); color: var(--red);
  border-radius: 2px; font-size: 9px;
  font-family: var(--sans); font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
}

/* ---- Top panel height control ---- */
#top-panel { height: 42vh; min-height: 280px; max-height: 480px; }

/* ---- Responsive: fewer columns on narrow ---- */
@media (max-width: 1400px) {
  #sec-suggest { width: 200px; }
  #sec-limits  { width: 190px; }
}
</style>
</head>
<body>
<div id="root">

  <!-- ======================================================
       TOP PANEL — Program manager + Controls
       ====================================================== -->
  <div id="top-panel">
    <div id="top-inner">

      <!-- Program list -->
      <div class="top-section" id="sec-programs">
        <div class="sec-header">Programs</div>
        <div id="program-list"></div>
        <div class="prog-actions">
          <button class="btn btn-gray btn-sm" onclick="newProgram()">+ New</button>
          <button class="btn btn-gray btn-sm" onclick="saveProgram()">Save</button>
          <button class="btn btn-gray btn-sm" onclick="deleteProgram()" style="color:var(--red)">Delete</button>
        </div>
      </div>

      <!-- Editor -->
      <div class="top-section" id="sec-editor">
        <div class="sec-header">Editor</div>
        <input id="prog-title-input" placeholder="Program title..." value="New Program">
        <textarea id="prog-editor" spellcheck="false"
          placeholder="# One command per line&#10;DETECT=2.0V&#10;CHARGE=4.2V&#10;MEASURE"
        ></textarea>
      </div>

      <!-- Suggestions -->
      <div class="top-section" id="sec-suggest">
        <div class="sec-header">Validation &amp; Suggestions</div>
        <div id="suggest-box"><span class="sug-line">Start typing to validate...</span></div>
      </div>

      <!-- Hard limits -->
      <div class="top-section" id="sec-limits">
        <div class="sec-header">Hard Limits</div>
        <div id="limits-form">
          <div class="limit-row">
            <label>Max charge V</label>
            <input class="limit-input" id="lim-max-charge-v" type="number" step="0.01" value="4.25">
          </div>
          <div class="limit-row">
            <label>Min discharge V</label>
            <input class="limit-input" id="lim-min-dsc-v" type="number" step="0.01" value="3.00">
          </div>
          <div class="limit-row">
            <label>Max settle H</label>
            <input class="limit-input" id="lim-max-settle-h" type="number" step="1" value="48">
          </div>
          <div class="limit-row">
            <label>Max current A</label>
            <input class="limit-input" id="lim-max-a" type="number" step="0.1" value="5.0">
          </div>
          <div class="limit-row">
            <label>Max temp °C</label>
            <input class="limit-input" id="lim-max-temp" type="number" step="1" value="60">
          </div>
          <div class="limit-row">
            <label>Stop on fan fail</label>
            <input class="limit-check" id="lim-fan-fail" type="checkbox" checked>
          </div>
          <div class="limit-row">
            <label>Fan fail timeout s</label>
            <input class="limit-input" id="lim-fan-timeout" type="number" step="1" value="5">
          </div>
          <div class="limit-row">
            <label>Stop on temp exceed</label>
            <input class="limit-check" id="lim-temp-stop" type="checkbox" checked>
          </div>
          <button class="btn btn-gray btn-sm" style="margin-top:4px" onclick="saveLimits()">Apply Limits</button>
        </div>
      </div>

      <!-- Actions + status -->
      <div class="top-section" id="sec-actions">
        <div class="sec-header">Control</div>
        <button class="btn btn-red"    onclick="stopAll()">⏹ STOP ALL</button>
        <button class="btn btn-yellow" onclick="applyAll()">⚡ APPLY TO ALL</button>
        <button class="btn btn-green"  onclick="startAll()">▶ START ALL</button>
        <button class="btn btn-blue"   onclick="autoStart()">🔄 AUTO START</button>
        <div id="status-box">
          <div class="sb-state sb-idle" id="sb-state">IDLE</div>
          <div id="sb-detail" style="margin-top:3px;">Nothing running yet.</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ======================================================
       BOTTOM PANEL — Device grid
       ====================================================== -->
  <div id="bottom-panel">
    <div id="device-grid">
      <div style="color:var(--text-dim);font-family:var(--mono);padding:20px;">
        Waiting for devices...
      </div>
    </div>
  </div>

</div>

<script>
// =============================================================
// State
// =============================================================
const socket = io();
let programs     = [];
let activeProg   = null;   // {id, title, body}
let snapshot     = {};
let validateTimer = null;
let globalAutoMode = false;

// =============================================================
// Socket
// =============================================================
socket.on("connect",    () => fetchAll());
socket.on("snapshot",   s  => { snapshot = s; window._lastSnapshot = s; renderDevices(); updateStatusBox(); });

function fetchAll() {
  fetchPrograms();
  fetchLimits();
}

// =============================================================
// Programs
// =============================================================
async function fetchPrograms() {
  const r = await fetch("/api/programs");
  programs = await r.json();
  renderProgramList();
}

function renderProgramList() {
  const el = document.getElementById("program-list");
  if (!programs.length) { el.innerHTML = '<div class="sug-line" style="padding:8px">No programs saved.</div>'; return; }
  el.innerHTML = programs.map(p => `
    <div class="prog-item ${activeProg && activeProg.id===p.id ? 'active':''}"
         onclick="loadProgram(${p.id})">
      <div class="p-title">${esc(p.title)}</div>
      <div class="p-date">${fmtDate(p.updated_at)}</div>
    </div>
  `).join("");
}

function loadProgram(id) {
  const p = programs.find(x => x.id === id);
  if (!p) return;
  activeProg = p;
  document.getElementById("prog-title-input").value = p.title;
  document.getElementById("prog-editor").value = p.body;
  renderProgramList();
  validateEditor();
}

function newProgram() {
  activeProg = null;
  document.getElementById("prog-title-input").value = "New Program";
  document.getElementById("prog-editor").value = "";
  renderProgramList();
  validateEditor();
}

async function saveProgram() {
  const title = document.getElementById("prog-title-input").value.trim();
  const body  = document.getElementById("prog-editor").value.trim();
  if (!title) { alert("Enter a program title."); return; }
  const payload = { title, body };
  if (activeProg) payload.id = activeProg.id;
  const r  = await fetch("/api/programs", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
  const data = await r.json();
  if (data.error) { alert(data.error); return; }
  activeProg = { id: data.id, title, body };
  await fetchPrograms();
}

async function deleteProgram() {
  if (!activeProg) return;
  if (!confirm(`Delete "${activeProg.title}"?`)) return;
  await fetch(`/api/programs/${activeProg.id}`, { method:"DELETE" });
  activeProg = null;
  document.getElementById("prog-title-input").value = "New Program";
  document.getElementById("prog-editor").value = "";
  await fetchPrograms();
  validateEditor();
}

// =============================================================
// Editor + validation
// =============================================================
document.getElementById("prog-editor").addEventListener("input", () => {
  clearTimeout(validateTimer);
  validateTimer = setTimeout(validateEditor, 400);
});

async function validateEditor() {
  const body = document.getElementById("prog-editor").value;
  const r    = await fetch("/api/programs/validate", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({body})
  });
  const data = await r.json();
  const ed   = document.getElementById("prog-editor");
  ed.className = data.valid ? "valid" : (body.trim() ? "invalid" : "");
  renderSuggestions(data);
}

function renderSuggestions(data) {
  const box = document.getElementById("suggest-box");
  let html = "";
  for (const c of (data.commands || [])) {
    const lnum = `<span style="color:var(--text-dim)">${String(c.line).padStart(2,'0')}</span>`;
    for (const e of c.errors)
      html += `<div class="sug-error">✖ L${c.line} ${esc(e)}</div>`;
    for (const w of c.warnings)
      html += `<div class="sug-warn">⚠ L${c.line} ${esc(w)}</div>`;
  }
  if (data.valid && !html)
    html += `<div class="sug-ok">✔ Program valid</div>`;
  for (const s of (data.suggestions || []))
    html += `<div class="sug-tip">${esc(s)}</div>`;
  if (!html) html = `<div class="sug-line">Waiting for input...</div>`;
  box.innerHTML = html;
}

// =============================================================
// Hard limits
// =============================================================
async function fetchLimits() {
  const r = await fetch("/api/limits");
  const l = await r.json();
  document.getElementById("lim-max-charge-v").value  = l.max_charge_v   ?? 4.25;
  document.getElementById("lim-min-dsc-v").value     = l.min_discharge_v ?? 3.00;
  document.getElementById("lim-max-settle-h").value  = l.max_settle_h   ?? 48;
  document.getElementById("lim-max-a").value         = l.max_charge_current_a ?? 5.0;
  document.getElementById("lim-max-temp").value      = l.max_temp_c     ?? 60;
  document.getElementById("lim-fan-fail").checked    = !!l.stop_on_fan_fail;
  document.getElementById("lim-fan-timeout").value   = l.fan_fail_timeout_s ?? 5;
  document.getElementById("lim-temp-stop").checked   = !!l.stop_on_temp_exceed;
}

async function saveLimits() {
  const payload = {
    max_charge_v:         parseFloat(document.getElementById("lim-max-charge-v").value),
    min_discharge_v:      parseFloat(document.getElementById("lim-min-dsc-v").value),
    max_settle_h:         parseFloat(document.getElementById("lim-max-settle-h").value),
    max_charge_current_a: parseFloat(document.getElementById("lim-max-a").value),
    max_temp_c:           parseInt(document.getElementById("lim-max-temp").value),
    stop_on_fan_fail:     document.getElementById("lim-fan-fail").checked ? 1 : 0,
    fan_fail_timeout_s:   parseInt(document.getElementById("lim-fan-timeout").value),
    stop_on_temp_exceed:  document.getElementById("lim-temp-stop").checked ? 1 : 0,
  };
  await fetch("/api/limits", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
  validateEditor();
}

// =============================================================
// Control buttons
// =============================================================
function getProgramPayload() {
  return {
    body:       document.getElementById("prog-editor").value,
    title:      document.getElementById("prog-title-input").value || "ad-hoc",
    program_id: activeProg ? activeProg.id : null,
  };
}

async function stopAll() {
  globalAutoMode = false;
  await fetch("/api/exec/stop_all", { method:"POST" });
  updateStatusBox();
}

async function applyAll() {
  await fetch("/api/exec/apply", { method:"POST" });
}

async function startAll() {
  globalAutoMode = false;
  const r = await fetch("/api/exec/start_all", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(getProgramPayload())
  });
  const d = await r.json();
  if (d.error) alert(d.error);
}

async function autoStart() {
  globalAutoMode = true;
  const r = await fetch("/api/exec/autostart", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(getProgramPayload())
  });
  const d = await r.json();
  if (d.error) { globalAutoMode = false; alert(d.error); }
  updateStatusBox();
}

// =============================================================
// Status box
// =============================================================
function updateStatusBox() {
  const s   = snapshot;
  const total   = s.device_count || 0;
  const online  = s.online_count || 0;
  const devices = s.devices || {};
  let running = 0, paused = 0;
  for (const d of Object.values(devices)) {
    if (d.session?.status === "running") running++;
    if (d.session?.status === "paused")  paused++;
  }

  const stateEl  = document.getElementById("sb-state");
  const detailEl = document.getElementById("sb-detail");

  if (globalAutoMode) {
    stateEl.className = "sb-state sb-auto";
    stateEl.textContent = "AUTO MODE";
    detailEl.textContent = `Running on ${running}/${online} devices`;
  } else if (running > 0 || paused > 0) {
    stateEl.className = "sb-state sb-running";
    stateEl.textContent = "RUNNING";
    detailEl.textContent = `${running} running, ${paused} paused / ${online} online`;
  } else if (online === 0) {
    stateEl.className = "sb-state sb-idle";
    stateEl.textContent = "IDLE";
    detailEl.textContent = "No devices online.";
  } else {
    stateEl.className = "sb-state sb-idle";
    stateEl.textContent = "IDLE";
    detailEl.textContent = `${online} device${online!==1?'s':''} online, no programs running.`;
  }
}

// =============================================================
// Device grid
// =============================================================
function renderDevices() {
  const grid    = document.getElementById("device-grid");
  const devices = snapshot.devices || {};
  const addrs   = Object.keys(devices).map(Number).sort((a,b) => a-b);

  const placeholder = document.getElementById("no-devices-placeholder");
  // Show all devices; MAC is used for title/alias but not required to display
  const visibleAddrs = addrs.filter(a => devices[a] !== undefined);

  if (!visibleAddrs.length) {
    if (placeholder) placeholder.style.display = "";
    grid.querySelectorAll(".device-card").forEach(el => el.remove());
    return;
  }
  if (placeholder) placeholder.style.display = "none";

  // Build/update cards (reuse existing DOM where possible)
  const existing = {};
  grid.querySelectorAll(".device-card").forEach(el => {
    existing[parseInt(el.dataset.address)] = el;
  });

  const newSet = new Set(visibleAddrs.map(String));

  // Remove cards for gone devices (or devices that lost their MAC)
  for (const [a, el] of Object.entries(existing)) {
    if (!newSet.has(a)) el.remove();
  }

  for (const addr of visibleAddrs) {
    const d = devices[addr];
    let card = existing[addr];
    if (!card) {
      card = document.createElement("div");
      card.className = "device-card";
      card.dataset.address = addr;
      card.innerHTML = buildCardHTML(addr, d);
      grid.appendChild(card);
      attachDragSlider(card, addr);
    } else {
      updateCardHTML(card, addr, d);
    }
  }
}

function buildCardHTML(addr, d) {
  return `
    <div class="card-titlebar">
      <div class="card-title-text" id="title-text-${addr}" onclick="${d.mac ? 'startTitleEdit('+addr+')' : ''}" style="${d.mac ? 'cursor:pointer' : 'cursor:default'}"${d.mac ? ` title="${d.alias ? 'Click to edit alias' : 'Click to set alias'}"` : ''}>
        ${deviceLabel(addr, d)}
      </div>
      <span class="card-ver-badge" id="ver-badge-${addr}">${d.schema_ver ? 'v'+d.schema_ver : 'v?'}</span>
      <div class="ctrl-slider" id="slider-${addr}">
        <div class="ctrl-handle">▐▌</div>
        <div class="ctrl-btns">
          <button class="ctrl-btn cb-start"  title="Start"  onclick="deviceStart(${addr})">▶</button>
          <button class="ctrl-btn cb-pause"  title="Pause"  onclick="devicePause(${addr})">⏸</button>
          <button class="ctrl-btn cb-stop"   title="Stop"   onclick="deviceStop(${addr})">⏹</button>
          <button class="ctrl-btn cb-unload" title="Unload" onclick="deviceUnload(${addr})">✕</button>
        </div>
      </div>
    </div>
    <div class="card-body" id="card-body-${addr}">
      ${buildCardBody(addr, d)}
    </div>
  `;
}

function updateCardHTML(card, addr, d) {
  // Update card class
  let cls = "device-card";
  if (!d.online) cls += " offline";
  else if (d.error) cls += " error";
  else if (d.session?.status === "running") cls += " running";
  else cls += " online";
  card.className = cls;

  // Update title (skip if user is currently editing it)
  const titleEl = card.querySelector(`#title-text-${addr}`);
  if (titleEl && !card.querySelector('.card-title-input')) {
    titleEl.textContent = deviceLabel(addr, d);
    titleEl.title = d.mac ? (d.alias ? 'Click to edit alias' : 'Click to set alias') : '';
    titleEl.style.cursor = d.mac ? 'pointer' : 'default';
    titleEl.onclick = d.mac ? () => startTitleEdit(addr) : null;
  }
  const verBadge = card.querySelector(`#ver-badge-${addr}`);
  if (verBadge) verBadge.textContent = d.schema_ver ? 'v'+d.schema_ver : 'v?';
  // Update body only
  const body = card.querySelector(`#card-body-${addr}`);
  if (body) body.innerHTML = buildCardBody(addr, d);
}

function deviceLabel(addr, d) {
  if (d.alias) return d.alias;
  if (d.mac)   return d.mac;
  return `#${addr}`;
}

function deviceLabelTitle(d) {
  if (d.alias) return 'Click to edit alias';
  if (d.mac)   return 'Click to set alias';
  return 'No MAC received yet';
}

function startTitleEdit(addr) {
  const titleEl = document.getElementById(`title-text-${addr}`);
  if (!titleEl) return;
  const d = window._lastSnapshot?.devices?.[addr];
  if (!d || !d.mac) return;  /* no MAC yet — alias would have no key */

  const current = d.alias || '';
  const placeholder = d.mac ? `e.g. "Pack A" — MAC: ${d.mac}` : `#${addr}`;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'card-title-input';
  input.value = current;
  input.placeholder = placeholder;
  input.maxLength = 32;

  // Replace text el with input
  titleEl.parentNode.replaceChild(input, titleEl);
  input.focus();
  input.select();

  let committed = false;

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      committed = true;
      commitAlias(addr, input.value.trim(), input);
    } else if (e.key === 'Escape') {
      committed = true;
      cancelEdit(addr, input);
    }
  });

  input.addEventListener('blur', () => {
    if (!committed) cancelEdit(addr, input);
  });
}

function cancelEdit(addr, input) {
  const d = window._lastSnapshot?.devices?.[addr];
  const titleEl = document.createElement('div');
  titleEl.className = 'card-title-text';
  titleEl.id = `title-text-${addr}`;
  titleEl.setAttribute('onclick', `startTitleEdit(${addr})`);
  titleEl.title = 'Click to set alias';
  titleEl.textContent = deviceLabel(addr, d || {});
  input.parentNode.replaceChild(titleEl, input);
}

async function commitAlias(addr, alias, input) {
  try {
    await fetch(`/api/device/${addr}/alias`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({alias: alias || null})
    });
    // Update local snapshot immediately — title re-renders on cancelEdit
    if (window._lastSnapshot?.devices?.[addr]) {
      window._lastSnapshot.devices[addr].alias = alias || null;
    }
  } catch(e) { console.warn('alias save failed', e); }
  cancelEdit(addr, input);
  // Briefly flash the title amber→white to confirm save
  const el = document.getElementById(`title-text-${addr}`);
  if (el) {
    el.style.color = 'var(--text)';
    setTimeout(() => el.style.color = '', 600);
  }
}

function buildCardBody(addr, d) {
  const online = d.online;
  const sess   = d.session;

  const modeLabels = ["IDLE","CHARGE","DISC","MEAS","WAIT","SETTLE"];
  const modeCls    = [""    ,"green" ,"amber","amber","","blue"];
  const chrgLabels = ["–","PRE","CC/CV","DONE"];

  let html = "";

  // Online indicator
  if (!online) {
    html += `<div><span class="badge-offline">OFFLINE</span></div>`;
  }

  // Voltage / current
  const vColor = d.vbat_v > 3.0 ? "green" : d.vbat_v > 0.2 ? "amber" : "red";
  const iSign  = d.ibat_a >= 0 ? "+" : "";
  html += row("V", `<span class="${vColor}">${d.vbat_v.toFixed(3)}V</span>`);
  html += row("I", `${iSign}${d.ibat_a.toFixed(3)}A`);

  // Mode
  const mIdx = Math.min(d.mode, modeLabels.length-1);
  html += row("Mode", `<span class="${modeCls[mIdx]||''}">${modeLabels[mIdx]}</span>`);

  // Charge stat
  if (d.chrg_stat > 0)
    html += row("CHG", chrgLabels[d.chrg_stat] || "?");

  // Temp / RPM
  if (d.bq_temp_c)
    html += row("Temp", `${d.bq_temp_c}°C`);
  if (d.rpm)
    html += row("Fan", `${d.rpm} rpm`);

  // IR
  if (d.ir_uohm > 0)
    html += row("IR", `${d.ir_uohm}µΩ`);

  // Flags
  let flags = [];
  if (d.error)       flags.push(`<span class="red">ERR</span>`);
  if (d.full)        flags.push(`<span class="green">FULL</span>`);
  if (!d.pwr_ok)     flags.push(`<span class="amber">NOPWR</span>`);
  if (!d.batt_present) flags.push(`<span style="color:var(--text-dim)">NOBAT</span>`);
  if (flags.length)
    html += `<hr class="card-divider">
             <div style="font-size:10px">${flags.join(" ")}</div>`;

  // Session
  if (sess) {
    html += `<hr class="card-divider">`;
    const sClass = {running:"sess-running",paused:"sess-paused",
                    stopped:"sess-stopped",done:"sess-done"}[sess.status] || "";
    html += `<div class="card-session-status ${sClass}">${sess.status.toUpperCase()}</div>`;
    if (sess.step_total > 0) {
      const pct = Math.round(sess.step_idx / sess.step_total * 100);
      html += `<div class="step-bar"><div class="step-bar-fill" style="width:${pct}%"></div></div>`;
      html += `<div style="font-size:10px;color:var(--text-dim)">
                 Step ${sess.step_idx+1}/${sess.step_total}: ${esc(sess.step_cmd)}</div>`;
    }
    if (sess.remaining_min != null)
      html += `<div style="font-size:10px;color:var(--amber)">⏱ ${fmtMin(sess.remaining_min)} left</div>`;
    if (sess.capacity_mah != null)
      html += `<div style="font-size:10px;color:var(--text-dim)">∫ ${sess.capacity_mah.toFixed(0)} mAh</div>`;
    if (sess.battery_dead)
      html += `<div style="font-size:10px;color:var(--red);font-weight:bold">BATTERY DEAD</div>`;
  }

  // Started at
  if (d.last_rx) {
    const ago = Math.floor((Date.now()/1000) - d.last_rx);
    html += `<div class="card-started-at">RX ${ago}s ago</div>`;
  }

  return html;
}

function row(key, val) {
  return `<div class="card-row">
    <span class="card-key">${key}</span>
    <span class="card-val">${val}</span>
  </div>`;
}

// =============================================================
// Drag slider
// =============================================================
function attachDragSlider(card, addr) {
  const slider  = card.querySelector(`#slider-${addr}`);
  if (!slider) return;

  let dragging = false, startX = 0, startW = 0;
  const COLLAPSED = 20;
  const OPEN_W    = () => card.offsetWidth / 2;

  function snapState(open) {
    slider.style.transition = "width 0.25s cubic-bezier(0.4,0,0.2,1)";
    slider.style.width = open ? OPEN_W() + "px" : COLLAPSED + "px";
    slider.classList.toggle("open", open);
    slider.dataset.open = open ? "1" : "0";
  }

  slider.addEventListener("mousedown", e => {
    dragging = true;
    startX   = e.clientX;
    startW   = slider.offsetWidth;
    slider.style.transition = "none";
    e.preventDefault();
  });

  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    const dx  = startX - e.clientX;   // drag left = open
    const w   = Math.max(COLLAPSED, Math.min(OPEN_W(), startW + dx));
    slider.style.width = w + "px";
    const isOpen = w > OPEN_W() * 0.4;
    slider.classList.toggle("open", isOpen);
  });

  window.addEventListener("mouseup", e => {
    if (!dragging) return;
    dragging = false;
    const isOpen = slider.offsetWidth > OPEN_W() * 0.4;
    snapState(isOpen);
  });

  // Touch support
  slider.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startW = slider.offsetWidth;
    slider.style.transition = "none";
  }, {passive:true});

  slider.addEventListener("touchmove", e => {
    const dx = startX - e.touches[0].clientX;
    const w  = Math.max(COLLAPSED, Math.min(OPEN_W(), startW + dx));
    slider.style.width = w + "px";
    slider.classList.toggle("open", w > OPEN_W() * 0.4);
  }, {passive:true});

  slider.addEventListener("touchend", e => {
    const isOpen = slider.offsetWidth > OPEN_W() * 0.4;
    snapState(isOpen);
  });
}

// =============================================================
// Per-device controls
// =============================================================
async function deviceStart(addr) {
  const body  = document.getElementById("prog-editor").value;
  const title = document.getElementById("prog-title-input").value || "ad-hoc";
  const pid   = activeProg ? activeProg.id : null;
  const r = await fetch(`/api/device/${addr}/start`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({body, title, program_id: pid})
  });
  const d = await r.json();
  if (d.error) alert(d.error);
}

async function devicePause(addr) {
  const s = snapshot.devices?.[addr]?.session;
  if (s?.status === "paused") {
    await fetch(`/api/device/${addr}/resume`, {method:"POST"});
  } else {
    await fetch(`/api/device/${addr}/pause`, {method:"POST"});
  }
}

async function deviceStop(addr) {
  await fetch(`/api/device/${addr}/stop`, {method:"POST"});
}

async function deviceUnload(addr) {
  if (!confirm(`Unload device #${addr}?`)) return;
  await fetch(`/api/device/${addr}/unload`, {method:"POST"});
}

// =============================================================
// Utilities
// =============================================================
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function fmtDate(ts) {
  if (!ts) return "–";
  const d = new Date(ts * 1000);
  return d.toISOString().replace("T"," ").slice(0,16);
}

function fmtMin(m) {
  if (m >= 60) return `${(m/60).toFixed(1)}h`;
  return `${Math.ceil(m)}m`;
}

// =============================================================
// Init
// =============================================================
window.addEventListener("load", () => {
  fetchAll();
  validateEditor();
});
</script>
